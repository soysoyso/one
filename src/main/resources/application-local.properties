# Local Docker profile. This profile uses the MySQL container from docker-compose.yml.

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.tomcat.uri-encoding=UTF-8
spring.mandatory-file-encoding=UTF-8

spring.main.datasource.hikari.poolName=SpringHikariCP
spring.main.datasource.hikari.driverClassName=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.main.datasource.hikari.jdbcUrl=jdbc:log4jdbc:mysql://road-sos-mysql:3306/road_sos?noAccessToProcedureBodies=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.main.datasource.hikari.username=roadsos
spring.main.datasource.hikari.password=roadsos
spring.main.datasource.hikari.connectionTimeout=3000
spring.main.datasource.hikari.minimumIdle=2
spring.main.datasource.hikari.maximumPoolSize=10
spring.main.datasource.hikari.idleTimeout=600000
spring.main.datasource.hikari.maxLifetime=1800000

spring.yido.datasource.hikari.poolName=SpringHikariCP
spring.yido.datasource.hikari.driverClassName=net.sf.log4jdbc.sql.jdbcapi.DriverSpy
spring.yido.datasource.hikari.jdbcUrl=jdbc:log4jdbc:mysql://road-sos-mysql:3306/yidohome?noAccessToProcedureBodies=true&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
spring.yido.datasource.hikari.username=roadsos
spring.yido.datasource.hikari.password=roadsos
spring.yido.datasource.hikari.minimumIdle=2
spring.yido.datasource.hikari.maximumPoolSize=10
spring.yido.datasource.hikari.connectionTimeout=30000
spring.yido.datasource.hikari.idleTimeout=30000
spring.yido.datasource.hikari.maxLifeTime=35000
spring.yido.datasource.hikari.leakDetectionThreshold=4000

kakao.local.search.address.url=https://dapi.kakao.com/v2/local/search/address.json
kakao.local.search.keyword.url=https://dapi.kakao.com/v2/local/search/keyword.json
kakao.local.endpoint=https://dapi.kakao.com/v2/local/geo/coord2address.json
kakao.local.key=local-placeholder
kakao.map.key=local-placeholder

Globals.File.UploadPath=/usr/local/webTempFiles/road-sos/
server.host.name=http://localhost:8703
